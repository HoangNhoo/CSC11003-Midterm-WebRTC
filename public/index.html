<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebRTC Mesh Group Call</title>

  <!-- FontAwesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <!-- Tailwind CSS via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Cấu hình màu tùy chỉnh cho Tailwind -->
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            dark: '#121212',
            surface: '#1e1e1e',
            primary: '#3b82f6', // blue-500
            secondary: '#10b981', // emerald-500
            danger: '#ef4444', // red-500
          }
        }
      }
    }
  </script>

  <style>
    /* Custom Scrollbar cho phần Console Log */
    #log-container::-webkit-scrollbar {
      width: 6px;
    }

    #log-container::-webkit-scrollbar-track {
      background: rgba(0, 0, 0, 0.3);
    }

    #log-container::-webkit-scrollbar-thumb {
      background-color: #4b5563;
      border-radius: 10px;
    }

    /* Logic Ẩn/Hiện màn hình */
    .hidden-view {
      display: none !important;
    }
  </style>
</head>

<body class="bg-dark text-gray-200 font-sans min-h-screen flex items-center justify-center p-4">

  <!-- ── MÀN HÌNH LOBBY ── -->
  <div id="lobby" class="w-full max-w-md bg-surface p-8 rounded-2xl shadow-2xl border border-gray-800">
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-blue-500/20 text-blue-400 mb-4">
        <i class="fa-solid fa-video text-2xl"></i>
      </div>
      <h2 class="text-2xl font-bold text-white">WebRTC Group Call</h2>
      <p class="text-gray-400 text-sm mt-2">Hệ thống gọi nhóm sử dụng Mesh Topology</p>
    </div>

    <div class="space-y-4">
      <!-- Input Nickname -->
      <div>
        <label for="inp-name" class="block text-sm font-medium text-gray-400 mb-1">Nickname</label>
        <div class="relative">
          <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
            <i class="fa-solid fa-user text-gray-500"></i>
          </div>
          <input id="inp-name" type="text" placeholder="Nhập tên của bạn"
            class="w-full pl-10 pr-4 py-3 bg-dark border border-gray-700 rounded-xl focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all text-white placeholder-gray-600">
        </div>
      </div>

      <!-- Input Room ID -->
      <div>
        <label for="inp-room" class="block text-sm font-medium text-gray-400 mb-1">Room ID</label>
        <div class="relative">
          <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
            <i class="fa-solid fa-door-open text-gray-500"></i>
          </div>
          <input id="inp-room" type="text" placeholder="Nhập mã phòng"
            class="w-full pl-10 pr-4 py-3 bg-dark border border-gray-700 rounded-xl focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all text-white placeholder-gray-600">
        </div>
      </div>

      <!-- Relay Mode Toggle -->
      <label
        class="flex items-center cursor-pointer p-3 rounded-xl border border-gray-800 bg-dark/50 hover:bg-gray-800 transition">
        <div class="relative">
          <input id="relay-mode-toggle" type="checkbox" class="sr-only" onchange="toggleRelayMode(this.checked)">
          <div class="block bg-gray-700 w-10 h-6 rounded-full"></div>
          <div class="dot absolute left-1 top-1 bg-white w-4 h-4 rounded-full transition transform"></div>
        </div>
        <div class="ml-3 text-sm font-medium text-gray-300">
          Chế độ ép dùng TURN (Relay)
        </div>
      </label>

      <!-- Nút hành động -->
      <div class="flex gap-3 pt-4">
        <button id="btn-create" onclick="enterRoom('createRoom')"
          class="flex-1 bg-gray-700 hover:bg-gray-600 text-white font-semibold py-3 px-4 rounded-xl transition duration-200 shadow-lg">
          <i class="fa-solid fa-plus mr-2"></i> Tạo phòng
        </button>
        <button id="btn-join" onclick="enterRoom('joinRoom')"
          class="flex-1 bg-primary hover:bg-blue-600 text-white font-semibold py-3 px-4 rounded-xl transition duration-200 shadow-lg shadow-blue-500/30">
          <i class="fa-solid fa-right-to-bracket mr-2"></i> Vào phòng
        </button>
      </div>
    </div>
  </div>

  <!-- ── MÀN HÌNH ROOM ── -->
  <div id="room" class="hidden-view w-full max-w-7xl min-h-screen md:h-[90vh] flex flex-col md:flex-row gap-4">

    <!-- MAIN CONTENT: Khu vực hiển thị Video (Trái) -->
    <div
      class="flex-[2] flex flex-col bg-surface rounded-2xl border border-gray-800 overflow-hidden shadow-2xl relative">
      <!-- Overlay: Status Bar -->
      <div class="absolute top-4 left-4 z-10 flex gap-2">
        <span
          class="bg-black/60 backdrop-blur-md text-gray-200 text-[10px] uppercase tracking-wider px-3 py-1.5 rounded-lg border border-gray-700 shadow-sm flex items-center gap-2">
          <div class="w-2 h-2 rounded-full bg-red-500 animate-pulse"></div>
          Live Connection
        </span>
        <span id="status-badge"
          class="bg-blue-500/20 backdrop-blur-md text-blue-400 text-[10px] uppercase tracking-wider px-3 py-1.5 rounded-lg border border-blue-500/30 shadow-sm flex items-center gap-2">
          ⚪ Waiting for peers...
        </span>
      </div>

      <!-- Video Grid -->
      <div id="video-grid" class="flex-1 w-full h-full p-6 grid gap-4 bg-[#0a0a0a] overflow-y-auto content-center">
        <!-- Videos will be injected here -->
      </div>
    </div>

    <!-- SIDEBAR: Thông tin & Console (Phải) -->
    <div class="flex-1 flex flex-col gap-4 min-w-[320px]">

      <!-- Box 1: Thông tin người dùng & Phòng -->
      <div class="bg-surface p-5 rounded-2xl border border-gray-800 shadow-lg border-t-2 border-t-blue-500">
        <div class="flex justify-between items-start mb-4">
          <div>
            <p class="text-[10px] text-gray-500 font-bold uppercase tracking-widest">Room Session</p>
            <h3 id="display-room" class="text-xl font-black text-white truncate">-</h3>
          </div>
          <div class="text-right">
            <p class="text-[10px] text-gray-500 font-bold uppercase tracking-widest">Your Identity</p>
            <p id="display-name" class="text-sm font-bold text-blue-400">-</p>
          </div>
        </div>

        <div class="flex items-center justify-between p-3 bg-black/40 rounded-xl border border-gray-700/50">
          <span class="text-xs text-gray-400">ICE Relay Mode:</span>
          <span id="mode-badge"
            class="hidden px-2 py-1 bg-yellow-500/10 border border-yellow-500/40 text-yellow-500 text-[10px] font-bold rounded-md">FORCE
            TURN</span>
        </div>
      </div>

      <!-- Box 2: Console Log (Thiết kế dạng Terminal) -->
      <div
        class="h-64 md:flex-1 bg-[#0d0d0d] rounded-2xl border border-gray-800 shadow-inner flex flex-col overflow-hidden group">
        <div class="px-4 py-2 bg-[#1a1a1a] border-b border-gray-800 flex justify-between items-center">
          <div class="flex gap-1.5">
            <div class="w-2.5 h-2.5 rounded-full bg-red-500/50"></div>
            <div class="w-2.5 h-2.5 rounded-full bg-yellow-500/50"></div>
            <div class="w-2.5 h-2.5 rounded-full bg-green-500/50"></div>
          </div>
          <span class="text-[13px] font-mono text-gray-500 tracking-tighter uppercase font-bold italic">Console
            Log</span>
        </div>

        <!-- Container log to, rõ ràng -->
        <div id="log-container"
          class="flex-1 p-4 overflow-y-auto font-mono text-[12px] leading-relaxed selection:bg-blue-500/30">
          <!-- Log lines go here -->
        </div>
      </div>

      <!-- Box 3: Thành viên & Nút bấm -->
      <div class="bg-surface p-5 rounded-2xl border border-gray-800 shadow-lg space-y-4">
        <div class="flex items-center justify-between border-b border-gray-800 pb-2">
          <span class="text-[10px] font-bold text-gray-500 uppercase tracking-widest">Active Members</span>
          <span id="members-count" class="text-xs font-mono bg-gray-800 px-2 py-0.5 rounded text-blue-400">0</span>
        </div>

        <div id="members-list" class="max-h-24 overflow-y-auto space-y-2 text-xs text-gray-300 custom-scrollbar">
          <!-- Members injected here -->
        </div>

        <div class="grid grid-cols-2 gap-2 pt-2">
          <button id="btn-start" onclick="startGroupCall()"
            class="col-span-2 bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-xl transition-all shadow-lg shadow-blue-900/20 active:scale-95 flex items-center justify-center gap-2 uppercase text-xs tracking-wider">
            <i class="fa-solid fa-play"></i> Bắt đầu gọi
          </button>

          <button id="btn-hangup" onclick="hangup()"
            class="hidden-view col-span-2 bg-red-600 hover:bg-red-500 text-white font-bold py-3 rounded-xl transition-all shadow-lg shadow-red-900/20 active:scale-95 flex items-center justify-center gap-2 uppercase text-xs tracking-wider">
            <i class="fa-solid fa-phone-slash"></i> Tắt máy
          </button>

          <button id="btn-leave" onclick="leaveRoom()"
            class="col-span-2 bg-gray-800 hover:bg-gray-700 text-gray-400 hover:text-white font-semibold py-2 rounded-xl transition-all border border-gray-700 flex items-center justify-center gap-2 text-xs uppercase">
            <i class="fa-solid fa-door-open"></i> Rời phòng
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Custom CSS for Relay Toggle Switch (để hoạt động với Tailwind) -->
  <style>
    input:checked~.block {
      background-color: #3b82f6;
      /* bg-primary */
    }

    input:checked~.dot {
      transform: translateX(100%);
    }

    /* Auto-fit lưới để hỗ trợ từ 1 tới nhiều video */
    .grid-cols-auto-fit {
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    }
  </style>

  <style>
    #video-grid {
      display: grid;
      gap: 1rem;
      padding: 1rem;
      width: 100%;
      height: 100%;
      grid-template-columns: repeat(var(--grid-cols, 1), minmax(0, 1fr));
      grid-auto-rows: auto;
      justify-items: stretch;
      align-items: stretch;
      align-content: start;
      overflow-y: auto;
    }

    /* Ensure every video tile has the same size/aspect ratio */
    .video-tile {
      width: 100%;
      aspect-ratio: 16 / 9;
      min-height: 0;
    }

    #room {
      overflow-y: auto;
    }

    @media (min-width: 768px) {
      #room {
        overflow-y: hidden;
      }
    }

    .video-wrapper {
      position: relative;
      width: 100%;
      height: auto;
      background: #1a1a1a;
      border-radius: 0.75rem;
      overflow: hidden;
      border: 1px solid #333;
      aspect-ratio: 16 / 9;
      transition: transform 0.2s ease;
      display: flex;
      margin: auto;
    }

    .video-wrapper video {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
  </style>
</body>

</html>

<script>
  const SIGNALING_URL = `${location.protocol === 'https:' ? 'wss:' : 'ws:'}//${location.host}`;

  const ICE_SERVERS = [
    { urls: 'stun:stun.l.google.com:19302' },
  ];

  // ════════════════════════════════════════════════════════
  // STATE
  // ════════════════════════════════════════════════════════
  let myName = '';
  let myRoom = '';
  let ws = null;
  let localStream = null;
  let isCallActive = false;
  let isJoiningRoom = false;
  let relayModeEnabled = false;
  let signalingQueue = Promise.resolve();
  let currentRoomMembers = []; // THÊM MỚI: Biến lưu danh sách để không phải cạo dữ liệu từ HTML
  let ensureMeshInProgress = false;
  let ensureMeshNeedsRerun = false;
  let ensureMeshForceOfferRequested = false;

  const peerConnections = new Map(); // Map<peerName, RTCPeerConnection>
  const pendingCandidates = new Map(); // Map<peerName, RTCIceCandidateInit[]>

  // ════════════════════════════════════════════════════════
  // LOGGING
  // ════════════════════════════════════════════════════════
  function log(msg, type = 'info') {
    const el = document.getElementById('log-container');
    const entry = document.createElement('div');
    entry.className = 'log-entry log-' + type;
    const time = new Date().toLocaleTimeString();
    entry.textContent = time + ' ' + msg;
    el.insertBefore(entry, el.firstChild);
    el.scrollTop = 0;
  }

  // ════════════════════════════════════════════════════════
  // ICE SERVERS — fetch từ server (.env)
  // ════════════════════════════════════════════════════════
  async function loadIceServers() {
    try {
      const res = await fetch('/api/ice-servers');
      if (!res.ok) throw new Error('ICE endpoint failed: ' + res.status);
      const data = await res.json();
      if (!data.iceServers || !Array.isArray(data.iceServers) || data.iceServers.length === 0) {
        throw new Error('No iceServers returned from server');
      }
      return data.iceServers;
    } catch { return ICE_SERVERS; }
  }

  async function processSignalEvent(event) {
    const text = event.data instanceof Blob ? await event.data.text() : event.data;
    let msg;
    try {
      msg = JSON.parse(text);
    } catch (e) {
      log('JSON parse error: ' + e.message, 'error');
      return;
    }
    log('RECV ' + msg.type + (msg.sender ? ' from=' + msg.sender : '') + (msg.target ? ' to=' + msg.target : ''), 'recv');
    await handleSignal(msg);
  }

  // ════════════════════════════════════════════════════════
  // WEBSOCKET
  // ════════════════════════════════════════════════════════
  function connectWS(callback) {
    ws = new WebSocket(SIGNALING_URL);
    ws.onopen = () => { log('WS connected', 'info'); callback(); };
    ws.onerror = (e) => log('WS error: ' + e, 'error');
    ws.onclose = () => log('WS closed', 'info');
    ws.onmessage = event => {
      signalingQueue = signalingQueue
        .then(() => processSignalEvent(event))
        .catch((e) => log('Signal handling error: ' + e.message, 'error'));
    };
  }

  function send(obj) {
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify(obj));
      log('SEND ' + obj.type + (obj.target ? ' to=' + obj.target : ''), 'send');
    }
  }

  function queueCandidate(peerName, candidate) {
    if (!pendingCandidates.has(peerName)) {
      pendingCandidates.set(peerName, []);
    }
    pendingCandidates.get(peerName).push(candidate);
    log('Queued candidate for ' + peerName, 'info');
  }

  async function flushPendingCandidates(peerName) {
    if (!peerConnections.has(peerName)) return;
    const pc = peerConnections.get(peerName);
    if (!pc.remoteDescription) return;
    const queued = pendingCandidates.get(peerName) || [];
    if (!queued.length) return;

    for (const candidate of queued) {
      try {
        await pc.addIceCandidate(new RTCIceCandidate(candidate));
      } catch (e) {
        console.warn('flush addIceCandidate error:', e);
      }
    }

    pendingCandidates.delete(peerName);
    log('Flushed queued candidates for ' + peerName, 'info');
  }

  // ════════════════════════════════════════════════════════
  // SIGNAL HANDLER
  // ════════════════════════════════════════════════════════
  async function handleSignal(msg) {
    const { type, sender, name, members, offer, answer, candidate, message } = msg;

    switch (type) {
      case 'error':
        isJoiningRoom = false;
        log('ERROR: ' + message, 'error');
        if (ws && ws.readyState === WebSocket.OPEN && document.getElementById('room').classList.contains('hidden-view')) {
          ws.close();
        }
        alert(message);
        break;

      case 'roomJoined':
        isJoiningRoom = false;
        document.getElementById('display-name').textContent = myName;
        document.getElementById('display-room').textContent = myRoom;
        document.getElementById('lobby').classList.add('hidden-view');
        const roomEl = document.getElementById('room');
        roomEl.classList.remove('hidden-view');
        roomEl.classList.add('flex');

        log('Joined room ' + myRoom, 'info');
        break;

      case 'roomMembers': {
        updateMembersList(members);
        log('roomMembers: ' + members.join(', '), 'info');
        if (isCallActive) {
          await ensureMeshConnections({ forceOffer: true, trigger: 'roomMembers' });
        }
        break;
      }

      case 'memberLeft':
        closePeer(name || sender);
        break;

      case 'offer':
        await handleOffer(sender, offer);
        break;

      case 'answer':
        if (peerConnections.has(sender)) {
          const pc = peerConnections.get(sender);
          await pc.setRemoteDescription(new RTCSessionDescription(answer));
          await flushPendingCandidates(sender);
          log('answer set for ' + sender, 'info');
          isCallActive = true;
          setCallControls(true);
          await ensureMeshConnections({ trigger: 'answer' });
        } else {
          log('answer received but no local offer/PC for ' + sender + ', ignoring', 'error');
        }
        break;

      case 'candidate':
        if (peerConnections.has(sender) && peerConnections.get(sender).remoteDescription) {
          try {
            await peerConnections.get(sender).addIceCandidate(new RTCIceCandidate(candidate));
          } catch (e) { console.warn('addIceCandidate error:', e); }
        } else {
          queueCandidate(sender, candidate);
        }
        break;

      case 'endCall':
        hangup({ notifyPeers: false, skipConfirm: true });
        break;
    }
  }

  // ════════════════════════════════════════════════════════
  // LOBBY → ROOM
  // ════════════════════════════════════════════════════════
  function enterRoom(action) {
    const name = document.getElementById('inp-name').value.trim();
    const room = document.getElementById('inp-room').value.trim();
    if (!name || !room) { alert('Nhập đủ tên và room ID'); return; }
    if (isJoiningRoom) return;

    myName = name;
    myRoom = room;
    isJoiningRoom = true;

    connectWS(() => {
      send({ type: 'register', name: myName });
      send({ type: action || 'joinRoom', roomId: myRoom, name: myName });
    });
  }

  // ════════════════════════════════════════════════════════
  // MEMBERS LIST & CONTROLS
  // ════════════════════════════════════════════════════════
  function updateMembersList(members) {
    currentRoomMembers = members; // Lưu state để không bị lỗi regex khi ấn Bắt đầu gọi
    document.getElementById('members-count').textContent = members.length;
    document.getElementById('members-list').innerHTML = members.map(m =>
      `<div class="flex items-center gap-2 py-1"><i class="fa-solid fa-user-circle text-gray-500"></i> ${m}</div>`
    ).join('');
  }

  function toggleRelayMode(enabled) {
    relayModeEnabled = enabled;
    const badge = document.getElementById('mode-badge');
    if (enabled) badge.classList.remove('hidden');
    else badge.classList.add('hidden');
    log('Relay mode ' + (enabled ? 'enabled' : 'disabled'), 'info');
  }

  function setCallControls(isInCall) {
    const btnStart = document.getElementById('btn-start');
    const btnHangup = document.getElementById('btn-hangup');
    if (isInCall) {
      btnStart.classList.add('hidden-view');
      btnHangup.classList.remove('hidden-view');
    } else {
      btnStart.classList.remove('hidden-view');
      btnHangup.classList.add('hidden-view');
    }
  }

  // ════════════════════════════════════════════════════════
  // VIDEO: lấy local stream & Add to DOM
  // ════════════════════════════════════════════════════════
  async function getLocalStream() {
    if (localStream) return localStream;
    try {
      localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
      addVideoElement('local', myName + ' (bạn)', localStream);
    } catch (e) {
      log('getUserMedia error: ' + e.message, 'error');
      alert('Không lấy được camera/mic: ' + e.message);
      throw e;
    }
    return localStream;
  }

  function updateGridScale() {
    const grid = document.getElementById('video-grid');
    if (!grid) return;

    const count = grid.children.length;
    let cols = 1;

    if (window.innerWidth >= 768) {
      if (count === 2) cols = 2; // 2 người: cạnh nhau (2x1)
      else if (count === 3 || count === 4) cols = 2; // 3-4 người: lưới 2x2
      else if (count >= 5 && count <= 9) cols = 3; // 5-9 người: lưới 3x3
      else if (count >= 10) cols = 4; // Từ 10 người trở lên: lưới 4x4
    }
    else {
      if (count === 1) cols = 1;
      else if (count >= 2 && count <= 6) cols = 2; // Ép 2 cột để video không quá nhỏ
      else if (count >= 7) cols = 3;
    }

    grid.style.setProperty('--grid-cols', cols);
  }

  // Bắt sự kiện người dùng xoay điện thoại hoặc thu phóng cửa sổ
  window.addEventListener('resize', updateGridScale);

  function addVideoElement(peerId, label, stream) {
    if (document.getElementById('wrap-' + peerId)) return;

    const wrap = document.createElement('div');
    wrap.id = 'wrap-' + peerId;
    // UPDATE UI: Add Tailwind Classes for responsive grid
    wrap.className = 'video-tile relative bg-gray-900 rounded-xl overflow-hidden shadow-lg border border-gray-800 group';

    wrap.innerHTML = `
        <video id="vid-${peerId}" class="absolute inset-0 w-full h-full object-cover" autoplay playsinline ${peerId === 'local' ? 'muted' : ''}></video>
        
        <div class="absolute top-3 left-3 flex gap-2">
          <span id="cand-${peerId}" class="hidden-view"></span>
        </div>
        
        <div class="absolute top-3 right-3">
          <span id="state-${peerId}" class="bg-black/60 text-gray-400 border border-gray-500/30 text-[10px] uppercase font-bold px-2 py-1 rounded shadow backdrop-blur flex items-center gap-1.5">
            <span id="dot-${peerId}" class="w-1.5 h-1.5 rounded-full bg-gray-400 animate-pulse"></span> 
            <span id="text-${peerId}">connecting</span>
          </span>
        </div>
        
        <div class="absolute bottom-0 w-full p-3 bg-gradient-to-t from-black/80 to-transparent">
          <span class="text-white text-sm font-medium drop-shadow-md flex items-center gap-2">
            <i class="fa-solid fa-circle-user text-gray-300"></i> ${label}
          </span>
        </div>
      `;

    document.getElementById('video-grid').appendChild(wrap);
    const videoEl = document.getElementById('vid-' + peerId);
    videoEl.srcObject = stream;

    // Sync tile state immediately (avoids race: PC becomes connected before DOM exists)
    if (peerId === 'local') {
      updateConnState('local', 'connected');
    } else if (peerConnections.has(peerId)) {
      updateConnState(peerId, peerConnections.get(peerId).connectionState || 'connecting');
    }

    updateGridScale();
  }

  function removeVideoElement(peerId) {
    const el = document.getElementById('wrap-' + peerId); // UPDATE UI: Remove wrap
    if (el) el.remove();
    updateGridScale();
  }

  function updateConnState(peerId, state) {
    // Sử dụng Tailwind classes thay vì emoji thuần
    const stateContainer = document.getElementById('state-' + peerId);
    const dotEl = document.getElementById('dot-' + peerId);
    const textEl = document.getElementById('text-' + peerId);

    if (!stateContainer || !dotEl || !textEl) return;
    textEl.textContent = state;
    updateGridScale();

    if (state === 'connected') {
      stateContainer.className = 'bg-black/60 text-emerald-400 border border-emerald-500/30 text-[10px] uppercase font-bold px-2 py-1 rounded shadow backdrop-blur flex items-center gap-1.5 absolute top-3 right-3';
      dotEl.className = 'w-1.5 h-1.5 rounded-full bg-emerald-400';
    } else if (state === 'failed' || state === 'disconnected') {
      stateContainer.className = 'bg-black/60 text-red-400 border border-red-500/30 text-[10px] uppercase font-bold px-2 py-1 rounded shadow backdrop-blur flex items-center gap-1.5 absolute top-3 right-3';
      dotEl.className = 'w-1.5 h-1.5 rounded-full bg-red-400';
    } else {
      stateContainer.className = 'bg-black/60 text-yellow-400 border border-yellow-500/30 text-[10px] uppercase font-bold px-2 py-1 rounded shadow backdrop-blur flex items-center gap-1.5 absolute top-3 right-3';
      dotEl.className = 'w-1.5 h-1.5 rounded-full bg-yellow-400 animate-pulse';
    }
  }

  // ════════════════════════════════════════════════════════
  // PEER CONNECTION FACTORY
  // ════════════════════════════════════════════════════════
  async function createPC(peerName, iceServers) {
    if (peerConnections.has(peerName)) {
      log('PC already exists for ' + peerName + ', reusing', 'info');
      return peerConnections.get(peerName);
    }
    const pc = new RTCPeerConnection({ iceServers, iceTransportPolicy: relayModeEnabled ? 'relay' : 'all' });
    log('PC created for ' + peerName, 'info');
    log('ICE transport policy for ' + peerName + ': ' + (relayModeEnabled ? 'relay' : 'all'), 'info');

    pc.turnFallbackTimer = setTimeout(() => {
      if (pc.connectionState !== 'connected') {
        log('P2P failed, trying TURN... (' + peerName + ')', 'error');
      }
    }, 12000);

    // Thêm local tracks
    const stream = await getLocalStream();
    stream.getTracks().forEach(track => pc.addTrack(track, stream));

    // Nhận remote stream
    const remoteStream = new MediaStream();
    pc.ontrack = (e) => {
      e.streams[0].getTracks().forEach(t => remoteStream.addTrack(t));
      addVideoElement(peerName, peerName, remoteStream);
      log('ontrack from ' + peerName, 'info');
    };

    // ICE candidate
    pc.onicecandidate = (e) => {
      if (e.candidate) {
        log('ICE cand for ' + peerName + ': ' + e.candidate.candidate, 'info');
        send({ type: 'candidate', roomId: myRoom, sender: myName, target: peerName, candidate: e.candidate });
      }
    };

    // Connection state
    pc.onconnectionstatechange = () => {
      console.log(`[${peerName}] connectionState:`, pc.connectionState);
      log('PC state ' + peerName + ': ' + pc.connectionState, pc.connectionState === 'connected' ? 'info' : 'error');
      if (pc.connectionState === 'connected' && pc.turnFallbackTimer) {
        clearTimeout(pc.turnFallbackTimer);
        pc.turnFallbackTimer = null;
      }
      if (pc.connectionState === 'connected') {
        isCallActive = true;
        setCallControls(true);
      }
      updateConnState(peerName, pc.connectionState);
      updateStatusBadge();

      if (pc.connectionState === 'connected') {
        logStats(pc, peerName);
      }
    };

    pc.oniceconnectionstatechange = () => {
      console.log(`[${peerName}] iceConnectionState:`, pc.iceConnectionState);
      log('ICE state ' + peerName + ': ' + pc.iceConnectionState, pc.iceConnectionState === 'connected' ? 'info' : (pc.iceConnectionState === 'failed' ? 'error' : 'info'));
      if (pc.iceConnectionState === 'failed') {
        log('P2P failed, trying TURN... (' + peerName + ')', 'error');
      }
    };

    peerConnections.set(peerName, pc);
    return pc;
  }

  // ════════════════════════════════════════════════════════
  // GROUP CALL: START (mesh — tôi offer đến mọi người)
  // ════════════════════════════════════════════════════════
  async function startGroupCall() {
    isCallActive = true;
    setCallControls(true);
    log('=== START GROUP CALL ' + new Date().toLocaleTimeString() + ' ===', 'info');
    await getLocalStream();
    await ensureMeshConnections({ forceOffer: true, trigger: 'startGroupCall' });
  }

  function shouldOfferTo(peerName) {
    return myName.localeCompare(peerName) < 0;
  }

  async function ensureMeshConnections(options = {}) {
    const { forceOffer = false, trigger = 'unknown' } = options;
    if (forceOffer) {
      ensureMeshForceOfferRequested = true;
    }

    if (ensureMeshInProgress) {
      ensureMeshNeedsRerun = true;
      return;
    }

    ensureMeshInProgress = true;
    try {
      do {
        ensureMeshNeedsRerun = false;
        const runForceOffer = ensureMeshForceOfferRequested;
        ensureMeshForceOfferRequested = false;
        await ensureMeshConnectionsOnce({ forceOffer: runForceOffer, trigger });
      } while (ensureMeshNeedsRerun);
    } finally {
      ensureMeshInProgress = false;
    }
  }

  async function ensureMeshConnectionsOnce({ forceOffer = false, trigger = 'unknown' } = {}) {
    if (!isCallActive) {
      return;
    }

    const iceServers = await loadIceServers();
    log('ICE servers: ' + JSON.stringify(iceServers), 'info');
    const others = currentRoomMembers.filter(m => m !== myName);
    log('Will ensure mesh with: ' + others.join(', ') + ` [${trigger}]` + (forceOffer ? ' (force offer)' : ''), 'info');

    for (const peer of others) {
      if (peerConnections.has(peer)) {
        continue;
      }

      if (!forceOffer && !shouldOfferTo(peer)) {
        log('Waiting offer from ' + peer + ' (deterministic offer rule)', 'info');
        continue;
      }

      const pc = await createPC(peer, iceServers);
      const offer = await pc.createOffer();
      await pc.setLocalDescription(offer);
      log('Sending offer to ' + peer, 'send');
      send({ type: 'offer', roomId: myRoom, sender: myName, target: peer, offer });
    }
  }

  // ════════════════════════════════════════════════════════
  // OFFER RECEIVED (từ peer khác)
  // ════════════════════════════════════════════════════════
  async function handleOffer(sender, offer) {
    isCallActive = true;
    setCallControls(true);
    log('Handling offer from ' + sender, 'recv');
    const iceServers = await loadIceServers();
    const pc = peerConnections.has(sender)
      ? peerConnections.get(sender)
      : await createPC(sender, iceServers);
    await pc.setRemoteDescription(new RTCSessionDescription(offer));
    await flushPendingCandidates(sender);
    const answer = await pc.createAnswer();
    await pc.setLocalDescription(answer);
    log('Sending answer to ' + sender, 'send');
    send({ type: 'answer', roomId: myRoom, sender: myName, target: sender, answer });
    await ensureMeshConnections({ trigger: 'handleOffer' });
  }

  // ════════════════════════════════════════════════════════
  // HANGUP
  // ════════════════════════════════════════════════════════
  function hangup(options = {}) {
    const { notifyPeers = true, skipConfirm = false, logEvent = true } = options;
    const membersEl = document.getElementById('members-list');
    let count = 0;

    if (membersEl) {
      const memberText = membersEl.textContent;
      const memberCountMatch = memberText.match(/\d+/);
      count = memberCountMatch ? parseInt(memberCountMatch[0]) : 0;
    }

    if (!skipConfirm && count > 1) {
      if (!confirm('Có ' + count + ' người trong phòng. Bạn chắc chắn muốn dừng cuộc gọi không?')) {
        return false;
      }
    }

    const hadActiveCall = isCallActive || peerConnections.size > 0 || localStream;
    isCallActive = false;
    if (hadActiveCall && logEvent) {
      log('=== END CALL ' + new Date().toLocaleTimeString() + ' ===', 'info');
    }
    if (notifyPeers) {
      send({ type: 'endCall', roomId: myRoom, sender: myName });
    }
    closeAllPeers();
    stopLocalStream();

    setCallControls(false);
    const badge = document.getElementById('status-badge');
    if (badge) badge.textContent = '⚪ Waiting';

    return true;
  }

  function closeAllPeers() {
    peerConnections.forEach((pc, name) => closePeer(name));
  }

  function closePeer(name) {
    if (peerConnections.has(name)) {
      const pc = peerConnections.get(name);
      if (pc.turnFallbackTimer) {
        clearTimeout(pc.turnFallbackTimer);
      }
      pc.close();
      peerConnections.delete(name);
    }
    pendingCandidates.delete(name);
    removeVideoElement(name);
  }

  function stopLocalStream() {
    if (localStream) {
      localStream.getTracks().forEach(t => t.stop());
      localStream = null;
    }
    removeVideoElement('local');
  }

  // ════════════════════════════════════════════════════════
  // LEAVE ROOM
  // ════════════════════════════════════════════════════════
  function leaveRoom() {
    const didHangup = hangup({ notifyPeers: false, skipConfirm: true, logEvent: false });
    if (!didHangup) {
      return;
    }
    isJoiningRoom = false;
    send({ type: 'leaveRoom', roomId: myRoom, sender: myName });

    // LƯU Ý KỸ THUẬT: Đã gỡ bỏ ws.close() ở đây để tránh đứt kết nối khi tạo phòng mới.

    myName = ''; myRoom = '';

    // UPDATE UI: Chuyển classList
    const lobbyEl = document.getElementById('lobby');
    const roomEl = document.getElementById('room');
    if (roomEl && lobbyEl) {
      roomEl.classList.add('hidden-view');
      roomEl.classList.remove('flex');
      lobbyEl.classList.remove('hidden-view');
    }
  }

  // ════════════════════════════════════════════════════════
  // STATUS BADGE
  // ════════════════════════════════════════════════════════
  function updateStatusBadge() {
    const states = [...peerConnections.values()].map(pc => pc.connectionState);
    const badge = document.getElementById('status-badge');
    if (states.includes('connected')) { badge.textContent = '🟢 Connected'; }
    else if (states.includes('connecting')) { badge.textContent = '🟡 Connecting...'; }
    else if (states.includes('failed')) { badge.textContent = '🔴 Failed'; }
    else { badge.textContent = '⚪ Waiting'; }
  }

  // ════════════════════════════════════════════════════════
  // STATS: log loại candidate (host / srflx / relay)
  // ════════════════════════════════════════════════════════
  async function logStats(pc, peerName) {
    const stats = await pc.getStats();
    let localCandType = 'unknown';

    // Pick the actually selected candidate pair (otherwise we may grab a random
    // succeeded pair, which often ends up being host/LAN).
    let selectedPair = null;

    // 1) Chrome/Edge: transport.selectedCandidatePairId
    stats.forEach(report => {
      if (selectedPair) return;
      if ((report.type === 'transport' || report.type === 'ice-transport') && report.selectedCandidatePairId) {
        const pair = stats.get(report.selectedCandidatePairId);
        if (pair && pair.type === 'candidate-pair') {
          selectedPair = pair;
        }
      }
    });

    // 2) Fallback: candidate-pair nominated/selected + succeeded
    if (!selectedPair) {
      stats.forEach(report => {
        if (selectedPair) return;
        if (report.type === 'candidate-pair' && report.state === 'succeeded' && (report.nominated || report.selected)) {
          selectedPair = report;
        }
      });
    }

    // 3) Last resort: any succeeded pair
    if (!selectedPair) {
      stats.forEach(report => {
        if (selectedPair) return;
        if (report.type === 'candidate-pair' && report.state === 'succeeded') {
          selectedPair = report;
        }
      });
    }

    if (selectedPair && selectedPair.localCandidateId) {
      const local = stats.get(selectedPair.localCandidateId);
      if (local) {
        localCandType = local.candidateType || local.type || 'unknown';
      }
    }

    console.log(`[STATS] ${peerName} — candidate type: ${localCandType}`);

    // Hiển thị lên Badge Video
    const candBadge = document.getElementById('cand-' + peerName);
    if (candBadge) {
      candBadge.classList.remove('hidden-view');
      if (localCandType === 'relay') {
        candBadge.textContent = '🔄 TURN/Relay';
        candBadge.className = 'bg-yellow-500/90 text-white text-[10px] uppercase font-bold px-2 py-1 rounded shadow backdrop-blur absolute top-3 left-3';
      } else if (localCandType === 'srflx' || localCandType === 'prflx') {
        candBadge.textContent = '🌐 STUN/srflx';
        candBadge.className = 'bg-blue-500/90 text-white text-[10px] uppercase font-bold px-2 py-1 rounded shadow backdrop-blur absolute top-3 left-3';
      } else {
        candBadge.textContent = '💻 LAN/Host';
        candBadge.className = 'bg-gray-600/90 text-white text-[10px] uppercase font-bold px-2 py-1 rounded shadow backdrop-blur absolute top-3 left-3';
      }
    }
  }
</script>
